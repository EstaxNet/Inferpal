name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore Inferpal.sln

      - name: Build (Release, warnings-as-errors)
        run: dotnet build Inferpal/Inferpal.csproj -c Release --no-restore

      - name: Test
        run: dotnet test Inferpal.Tests/Inferpal.Tests.csproj -c Release --no-restore
