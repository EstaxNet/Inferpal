name: CodeQL

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    # Weekly re-scan so newly published queries catch existing code.
    - cron: "27 4 * * 1"

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (C#)
    runs-on: windows-latest
    permissions:
      security-events: write   # required to upload results to the Security tab
      contents: read

    steps:
      - uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: csharp
          # Source-level analysis — no project build needed, which avoids dragging
          # the full VS Extensibility SDK build into the scanner.
          build-mode: none
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:csharp"
